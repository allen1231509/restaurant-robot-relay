<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel del Mesero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --border: #2a2a4a;
            --purple: #a78bfa;
            --green: #4ade80;
            --red: #ef4444;
            --yellow: #f59e0b;
            --blue: #60a5fa;
            --text: #ffffff;
            --muted: #666688;
        }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

        /* ── Login ── */
        #loginScreen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; gap: 20px; }
        .login-icon { font-size: 64px; }
        .login-title { font-size: 24px; font-weight: bold; color: var(--purple); }
        .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; }
        .login-card label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .login-card input { padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px; width: 100%; }
        .login-card input:focus { outline: none; border-color: var(--purple); }
        #loginBtn { padding: 16px; border-radius: 10px; border: none; background: var(--purple); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }

        /* ── App ── */
        #appScreen { display: none; flex-direction: column; flex: 1; }
        #header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); }
        #headerTitle { font-size: 16px; font-weight: bold; color: var(--purple); }
        #headerSub { font-size: 10px; color: var(--muted); }
        .robot-badge { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); }
        .robot-badge.online { border-color: #4ade8044; color: var(--green); background: #1e3a2e; }
        .robot-badge.offline { border-color: #ef444444; color: var(--red); background: #1e0a0a; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot.green { background: var(--green); }
        .dot.red { background: var(--red); }

        #tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 10px 2px; text-align: center; cursor: pointer; font-size: 10px; color: var(--muted); border-bottom: 2px solid transparent; }
        .tab.active { color: var(--purple); border-bottom-color: var(--purple); }
        .tab-icon { font-size: 18px; display: block; }

        #tabContent { flex: 1; overflow-y: auto; padding: 16px; }
        .panel { display: none; flex-direction: column; gap: 14px; }
        .panel.active { display: flex; }

        .section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }

        /* Mesas */
        .tables-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 16px; text-align: center; cursor: pointer; position: relative; transition: all 0.15s; }
        .table-card:hover { border-color: var(--purple); }
        .table-card.selected { border-color: var(--purple); background: #1e1a3a; }
        .table-card.ocupada { border-color: #f59e0b44; }
        .table-card.robot-aqui { border-color: #4ade8044; }
        .table-emoji { font-size: 28px; margin-bottom: 8px; }
        .table-name { font-size: 15px; font-weight: bold; }
        .table-status { font-size: 11px; color: var(--muted); margin-top: 4px; }
        .table-status.ocupada { color: var(--yellow); }
        .table-status.robot { color: var(--green); }
        .status-dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; border-radius: 50%; }

        .action-section { display: flex; flex-direction: column; gap: 8px; }
        .main-btn { padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .main-btn.purple { background: var(--purple); color: #fff; }
        .main-btn.purple:disabled { background: #333; color: #666; cursor: not-allowed; }
        .main-btn.outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        .main-btn.outline:hover { border-color: var(--purple); color: var(--purple); }
        .main-btn.red { background: transparent; border: 1px solid #ef444444; color: var(--red); }

        /* Pedidos */
        .pedido-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; gap: 12px; align-items: flex-start; }
        .pedido-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
        .pedido-mesa { font-size: 14px; font-weight: bold; }
        .pedido-items { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
        .pedido-hora { font-size: 11px; color: var(--muted); margin-top: 4px; }
        .pedido-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; margin-left: auto; flex-shrink: 0; }
        .badge-prep { background: #1e1a0a; color: var(--yellow); }
        .badge-listo { background: #1e3a2e; color: var(--green); }
        .badge-camino { background: #1a1a3e; color: var(--blue); }
        .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 14px; }

        /* Estado robot */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .stat-box { background: #0f0f1a; border-radius: 10px; padding: 14px 8px; text-align: center; }
        .stat-val { font-size: 22px; font-weight: bold; }
        .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

        /* Feedback */
        #feedback { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #222; border: 1px solid var(--border); border-radius: 8px; padding: 10px 20px; font-size: 13px; display: none; z-index: 999; white-space: nowrap; }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
    <div class="login-icon">👨‍🍳</div>
    <div class="login-title">Panel del Mesero</div>
    <div class="login-card">
        <label>URL del relay</label>
        <input id="relayUrl" type="text" placeholder="restaurant-robot-relay.onrender.com">
        <label>Clave secreta</label>
        <input id="relaySecret" type="password" placeholder="clave secreta">
        <div id="loginStatus" style="font-size:12px;color:var(--muted);text-align:center;min-height:16px"></div>
        <button id="loginBtn" onclick="conectar()">Entrar →</button>
    </div>
</div>

<!-- App -->
<div id="appScreen">
    <div id="header">
        <div>
            <div id="headerTitle">Panel del Mesero</div>
            <div id="headerSub">Restaurante Demo</div>
        </div>
        <div id="robotBadge" class="robot-badge offline">
            <div class="dot red" id="robotDot"></div>
            <span id="robotStatus">Robot offline</span>
        </div>
    </div>

    <div id="tabs">
        <div class="tab active" onclick="switchTab('mesas', this)"><span class="tab-icon">🍽️</span>Mesas</div>
        <div class="tab" onclick="switchTab('pedidos', this)"><span class="tab-icon">📋</span>Pedidos</div>
        <div class="tab" onclick="switchTab('robot', this)"><span class="tab-icon">🤖</span>Robot</div>
    </div>

    <div id="tabContent">

        <!-- Mesas -->
        <div id="panel-mesas" class="panel active">
            <div>
                <div class="section-label">Selecciona una mesa</div>
                <div class="tables-grid" id="tablesGrid"></div>
            </div>
            <div class="action-section">
                <button class="main-btn purple" id="btnEnviar" disabled onclick="enviarRobot()">
                    🤖 Enviar robot a mesa
                </button>
                <button class="main-btn outline" onclick="enviarARecepcion()">
                    🏠 Enviar a recepción
                </button>
            </div>
        </div>

        <!-- Pedidos -->
        <div id="panel-pedidos" class="panel">
            <div class="section-label">Pedidos activos</div>
            <div id="pedidosList">
                <div class="empty-state">Sin pedidos activos</div>
            </div>
        </div>

        <!-- Robot -->
        <div id="panel-robot" class="panel">
            <div class="section-label">Estado del robot</div>
            <div class="card">
                <div class="stat-grid">
                    <div class="stat-box">
                        <div class="stat-val" id="statBateria" style="color:var(--green)">--%</div>
                        <div class="stat-label">Batería</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-val" id="statUbicacion" style="color:var(--purple);font-size:14px">--</div>
                        <div class="stat-label">Ubicación</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-val" id="statEntregas" style="color:var(--yellow)">0</div>
                        <div class="stat-label">Entregas</div>
                    </div>
                </div>
            </div>
            <div class="action-section">
                <button class="main-btn outline" onclick="enviarARecepcion()">🏠 Enviar a recepción</button>
                <button class="main-btn outline" onclick="enviarACocina()">🍳 Enviar a cocina</button>
                <button class="main-btn red" onclick="desconectar()">✕ Salir</button>
            </div>
        </div>

    </div>
</div>

<div id="feedback"></div>

<script>
const MESAS = ['mesa 1', 'mesa 2', 'mesa 3', 'mesa 4'];
const EMOJIS = { 'mesa 1': '1️⃣', 'mesa 2': '2️⃣', 'mesa 3': '3️⃣', 'mesa 4': '4️⃣' };

let ws = null;
let mesaSeleccionada = null;
let robotOnline = false;
let pedidos = [];
let entregas = 0;
let estadoMesas = {};

MESAS.forEach(m => estadoMesas[m] = 'libre');

// ── Conexión ──────────────────────────────────────────────
function conectar() {
    const url    = document.getElementById('relayUrl').value.trim() || 'restaurant-robot-relay.onrender.com';
    const secret = document.getElementById('relaySecret').value.trim() || 'mirobotclave2024';
    const status = document.getElementById('loginStatus');
    const btn    = document.getElementById('loginBtn');

    btn.textContent = 'Conectando...';
    status.textContent = '';

    ws = new WebSocket(`wss://${url}?type=mesero&secret=${secret}`);

    ws.onopen = () => {
        localStorage.setItem('relayUrl', url);
        localStorage.setItem('relaySecret', secret);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'flex';
        renderMesas();
        feedback('✅ Conectado al relay', 'green');
    };

    ws.onclose = () => {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appScreen').style.display = 'none';
        btn.textContent = 'Entrar →';
        feedback('❌ Desconectado', 'red');
    };

    ws.onerror = () => {
        btn.textContent = 'Entrar →';
        status.textContent = '❌ No se pudo conectar';
    };

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleMessage(msg);
    };
}

function desconectar() {
    if (ws) ws.close();
}

function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

// ── Mensajes del relay ────────────────────────────────────
function handleMessage(msg) {
    switch (msg.type) {
        case 'robot_status':
            setRobotStatus(msg.connected);
            break;
        case 'robot_navegando':
            if (msg.mesa) {
                estadoMesas[msg.mesa] = 'robot';
                renderMesas();
                feedback(`🤖 Robot yendo a ${msg.mesa}`, 'purple');
            }
            break;
        case 'robot_en_mesa':
            estadoMesas[msg.mesa] = 'robot-aqui';
            renderMesas();
            feedback(`✅ Robot en ${msg.mesa}`, 'green');
            break;
        case 'pedido_recibido':
            feedback(`📋 Pedido de ${msg.mesa} enviado a cocina`, 'green');
            estadoMesas[msg.mesa] = 'ocupada';
            renderMesas();
            break;
        case 'nuevo_pedido':
            agregarPedido(msg);
            break;
        case 'pedido_listo':
            marcarPedidoListo(msg.mesa);
            feedback(`🍳 Pedido de ${msg.mesa} listo - robot va a recoger`, 'yellow');
            break;
        case 'entrega_completada':
            entregas++;
            document.getElementById('statEntregas').textContent = entregas;
            estadoMesas[msg.mesa] = 'libre';
            renderMesas();
            eliminarPedido(msg.mesa);
            feedback(`✅ Entrega completada en ${msg.mesa}`, 'green');
            break;
        case 'estado_robot':
            if (msg.bateria !== undefined) document.getElementById('statBateria').textContent = msg.bateria + '%';
            if (msg.ubicacion) document.getElementById('statUbicacion').textContent = msg.ubicacion;
            break;
    }
}

// ── Robot status ──────────────────────────────────────────
function setRobotStatus(online) {
    robotOnline = online;
    const badge = document.getElementById('robotBadge');
    const dot   = document.getElementById('robotDot');
    const text  = document.getElementById('robotStatus');
    if (online) {
        badge.className = 'robot-badge online';
        dot.className = 'dot green';
        text.textContent = 'Robot online';
    } else {
        badge.className = 'robot-badge offline';
        dot.className = 'dot red';
        text.textContent = 'Robot offline';
    }
}

// ── Mesas ─────────────────────────────────────────────────
function renderMesas() {
    const grid = document.getElementById('tablesGrid');
    grid.innerHTML = MESAS.map(mesa => {
        const estado = estadoMesas[mesa] || 'libre';
        const sel = mesaSeleccionada === mesa ? 'selected' : '';
        let statusText = 'Libre';
        let statusClass = '';
        let dotColor = '';
        let dotStyle = 'display:none';

        if (estado === 'ocupada') { statusText = 'Ocupada'; statusClass = 'ocupada'; dotColor = 'background:var(--yellow)'; dotStyle = ''; }
        if (estado === 'robot' || estado === 'robot-aqui') { statusText = 'Robot aquí'; statusClass = 'robot'; dotColor = 'background:var(--green)'; dotStyle = ''; }

        return `<div class="table-card ${estado} ${sel}" onclick="selectMesa('${mesa}')">
            <div class="status-dot" style="${dotStyle};${dotColor}"></div>
            <div class="table-emoji">${EMOJIS[mesa]}</div>
            <div class="table-name">${mesa.charAt(0).toUpperCase() + mesa.slice(1)}</div>
            <div class="table-status ${statusClass}">${statusText}</div>
        </div>`;
    }).join('');
}

function selectMesa(mesa) {
    mesaSeleccionada = mesa;
    renderMesas();
    document.getElementById('btnEnviar').disabled = false;
    document.getElementById('btnEnviar').textContent = `🤖 Enviar robot a ${mesa}`;
}

// ── Acciones ──────────────────────────────────────────────
function enviarRobot() {
    if (!mesaSeleccionada) return;
    if (!robotOnline) { feedback('❌ Robot no conectado', 'red'); return; }
    send({ action: 'irAMesa', mesa: mesaSeleccionada });
    feedback(`🤖 Enviando robot a ${mesaSeleccionada}...`, 'purple');
    document.getElementById('btnEnviar').disabled = true;
    setTimeout(() => { document.getElementById('btnEnviar').disabled = false; }, 3000);
}

function enviarARecepcion() {
    send({ action: 'irARecepcion' });
    feedback('🏠 Robot yendo a recepción...', 'purple');
}

function enviarACocina() {
    send({ action: 'irACocina' });
    feedback('🍳 Robot yendo a cocina...', 'purple');
}

// ── Pedidos ───────────────────────────────────────────────
function agregarPedido(msg) {
    const existing = pedidos.find(p => p.mesa === msg.mesa);
    if (existing) { existing.items = msg.items; existing.estado = 'preparando'; }
    else pedidos.push({ mesa: msg.mesa, items: msg.items, hora: msg.hora || new Date().toLocaleTimeString(), estado: 'preparando' });
    renderPedidos();
}

function marcarPedidoListo(mesa) {
    const p = pedidos.find(p => p.mesa === mesa);
    if (p) { p.estado = 'listo'; renderPedidos(); }
}

function eliminarPedido(mesa) {
    pedidos = pedidos.filter(p => p.mesa !== mesa);
    renderPedidos();
}

function renderPedidos() {
    const container = document.getElementById('pedidosList');
    if (pedidos.length === 0) {
        container.innerHTML = '<div class="empty-state">Sin pedidos activos</div>';
        return;
    }
    container.innerHTML = pedidos.map(p => {
        const color = p.estado === 'listo' ? 'var(--green)' : p.estado === 'camino' ? 'var(--blue)' : 'var(--yellow)';
        const badge = p.estado === 'listo' ? 'badge-listo' : p.estado === 'camino' ? 'badge-camino' : 'badge-prep';
        const badgeText = p.estado === 'listo' ? 'Listo' : p.estado === 'camino' ? 'En camino' : 'Preparando';
        const itemsText = Array.isArray(p.items)
            ? p.items.map(i => `${i.cantidad}x ${i.nombre}`).join(', ')
            : 'Pedido recibido';
        return `<div class="pedido-card">
            <div class="pedido-dot" style="background:${color}"></div>
            <div style="flex:1">
                <div class="pedido-mesa">${p.mesa.charAt(0).toUpperCase() + p.mesa.slice(1)}</div>
                <div class="pedido-items">${itemsText}</div>
                <div class="pedido-hora">${p.hora}</div>
            </div>
            <span class="pedido-badge ${badge}">${badgeText}</span>
        </div>`;
    }).join('');
}

// ── Tabs ──────────────────────────────────────────────────
function switchTab(name, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    el.classList.add('active');
}

// ── Feedback ──────────────────────────────────────────────
function feedback(msg, color = 'green') {
    const el = document.getElementById('feedback');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.color = color === 'red' ? 'var(--red)' : color === 'yellow' ? 'var(--yellow)' : color === 'purple' ? 'var(--purple)' : 'var(--green)';
    clearTimeout(el._t);
    el._t = setTimeout(() => el.style.display = 'none', 3000);
}

// ── Init ──────────────────────────────────────────────────
window.onload = () => {
    const url    = localStorage.getItem('relayUrl');
    const secret = localStorage.getItem('relaySecret');
    if (url)    document.getElementById('relayUrl').value = url;
    if (secret) document.getElementById('relaySecret').value = secret;
};
</script>
</body>
</html>
