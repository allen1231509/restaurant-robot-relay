<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Cocina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --border: #2a2a2a;
            --green: #4ade80;
            --red: #ef4444;
            --yellow: #f59e0b;
            --blue: #60a5fa;
            --orange: #fb923c;
            --text: #ffffff;
            --muted: #666;
        }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

        #loginScreen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; gap: 20px; }
        .login-icon { font-size: 64px; }
        .login-title { font-size: 24px; font-weight: bold; color: var(--orange); }
        .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; }
        .login-card label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .login-card input { padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px; width: 100%; }
        .login-card input:focus { outline: none; border-color: var(--orange); }
        #loginBtn { padding: 16px; border-radius: 10px; border: none; background: var(--orange); color: #000; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }

        #appScreen { display: none; flex-direction: column; flex: 1; }
        #header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); }
        #headerTitle { font-size: 16px; font-weight: bold; color: var(--orange); }
        #headerSub { font-size: 10px; color: var(--muted); }
        .status-badge { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); }
        .status-badge.online { border-color: #4ade8044; color: var(--green); background: #0a1e0a; }
        .status-badge.offline { border-color: #ef444444; color: var(--red); background: #1e0a0a; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }

        #statsBar { display: flex; background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 16px; gap: 16px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .stat-num { font-size: 20px; font-weight: bold; }
        .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

        #pedidosContainer { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }

        .pedido-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .pedido-card.nuevo { border-color: var(--yellow); animation: flash 0.5s ease 3; }
        .pedido-card.listo { border-color: var(--green); }
        .pedido-card.robot_aqui { border-color: var(--green); }
        .pedido-card.entregando { border-color: var(--blue); opacity: 0.8; }

        @keyframes flash {
            0%, 100% { border-color: var(--yellow); }
            50% { border-color: #fff; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .pedido-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); }
        .pedido-mesa { font-size: 18px; font-weight: bold; }
        .pedido-hora { font-size: 12px; color: var(--muted); }
        .pedido-timer { font-size: 14px; font-weight: bold; font-family: monospace; padding: 4px 10px; border-radius: 8px; background: #1a1a00; color: var(--yellow); }
        .pedido-timer.urgente { background: #1a0000; color: var(--red); }

        .pedido-items { padding: 12px 16px; }
        .item-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
        .item-row:last-child { border-bottom: none; }
        .item-qty { font-size: 18px; font-weight: bold; color: var(--orange); min-width: 28px; text-align: center; }
        .item-name { font-size: 15px; flex: 1; }
        .item-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; flex-shrink: 0; }
        .item-check.done { background: var(--green); border-color: var(--green); color: #000; }

        .pedido-footer { padding: 12px 16px; display: flex; gap: 8px; }
        .btn-listo { flex: 1; padding: 14px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; background: var(--green); color: #000; }
        .btn-listo:active { opacity: 0.8; }
        .btn-listo.ya-listo { background: #1e3a2e; color: var(--green); cursor: not-allowed; }
        .btn-listo.cargado { background: var(--green); color: #000; animation: pulse 0.8s infinite; }
        .btn-cancelar { padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 14px; }

        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); padding: 40px; text-align: center; }
        .empty-icon { font-size: 48px; }

        #alertBanner { background: var(--yellow); color: #000; padding: 10px 16px; font-size: 14px; font-weight: bold; text-align: center; display: none; }
        #feedback { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #222; border: 1px solid var(--border); border-radius: 8px; padding: 10px 20px; font-size: 13px; display: none; z-index: 999; white-space: nowrap; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-icon">🍳</div>
    <div class="login-title">Panel de Cocina</div>
    <div class="login-card">
        <label>URL del relay</label>
        <input id="relayUrl" type="text" placeholder="restaurant-robot-relay.onrender.com">
        <label>Clave secreta</label>
        <input id="relaySecret" type="password" placeholder="clave secreta">
        <div id="loginStatus" style="font-size:12px;color:var(--muted);text-align:center;min-height:16px"></div>
        <button id="loginBtn" onclick="conectar()">Entrar a cocina →</button>
    </div>
</div>

<div id="appScreen">
    <div id="alertBanner">🔔 ¡Nuevo pedido!</div>

    <div id="header">
        <div>
            <div id="headerTitle">🍳 Panel de Cocina</div>
            <div id="headerSub">Restaurante Demo</div>
        </div>
        <div id="robotBadge" class="status-badge offline">
            <div class="dot" id="robotDot" style="background:var(--red)"></div>
            <span id="robotStatus">Robot offline</span>
        </div>
    </div>

    <div id="statsBar">
        <div class="stat-item">
            <div class="stat-num" id="statPendientes" style="color:var(--yellow)">0</div>
            <div class="stat-lbl">Pendientes</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="statListos" style="color:var(--green)">0</div>
            <div class="stat-lbl">Listos</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="statEntregados" style="color:var(--blue)">0</div>
            <div class="stat-lbl">Entregados</div>
        </div>
    </div>

    <div id="pedidosContainer">
        <div class="empty-state">
            <div class="empty-icon">🍽️</div>
            <div style="font-size:16px">Sin pedidos por ahora</div>
            <div style="font-size:13px">Los pedidos aparecerán aquí cuando los clientes ordenen</div>
        </div>
    </div>
</div>

<div id="feedback"></div>

<script>
let ws = null;
let pedidos = [];
let entregados = 0;
let timers = {};

function conectar() {
    const url    = document.getElementById('relayUrl').value.trim() || 'restaurant-robot-relay.onrender.com';
    const secret = document.getElementById('relaySecret').value.trim() || 'mirobotclave2024';
    const status = document.getElementById('loginStatus');
    const btn    = document.getElementById('loginBtn');

    btn.textContent = 'Conectando...';
    ws = new WebSocket(`wss://${url}?type=cocina&secret=${secret}`);

    ws.onopen = () => {
        localStorage.setItem('relayUrl', url);
        localStorage.setItem('relaySecret', secret);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'flex';
        feedback('✅ Conectado', 'green');
    };

    ws.onclose = () => {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appScreen').style.display = 'none';
        btn.textContent = 'Entrar a cocina →';
        Object.values(timers).forEach(t => clearInterval(t));
    };

    ws.onerror = () => {
        btn.textContent = 'Entrar a cocina →';
        status.textContent = '❌ No se pudo conectar';
    };

    ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
}

function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function handleMessage(msg) {
    switch (msg.type) {
        case 'robot_status':
            setRobotStatus(msg.connected);
            break;
        case 'nuevo_pedido':
            agregarPedido(msg);
            mostrarAlerta();
            break;
        case 'robot_navegando':
            if (msg.destino === 'cocina') {
                feedback('🤖 Robot en camino a cocina...', 'green');
            }
            break;
        case 'robot_en_cocina':
            robotEnCocina(msg.mesa);
            break;
        case 'robot_llevando':
            marcarEntregando(msg.mesa);
            feedback(`🚀 Robot llevando pedido a ${msg.mesa}`, 'green');
            break;
        case 'entrega_completada':
            entregados++;
            document.getElementById('statEntregados').textContent = entregados;
            eliminarPedido(msg.mesa);
            feedback(`✅ Entrega completada en ${msg.mesa}`, 'green');
            break;
        case 'error_robot':
            feedback(`❌ Error: ${msg.detalle}`, 'red');
            const p = pedidos.find(p => p.mesa === msg.mesa);
            if (p && p.estado === 'listo') {
                p.estado = 'listo';
                renderPedidos();
            }
            break;
    }
}

function setRobotStatus(online) {
    const badge = document.getElementById('robotBadge');
    const dot   = document.getElementById('robotDot');
    const text  = document.getElementById('robotStatus');
    if (online) {
        badge.className = 'status-badge online';
        dot.style.background = 'var(--green)';
        text.textContent = 'Robot online';
    } else {
        badge.className = 'status-badge offline';
        dot.style.background = 'var(--red)';
        text.textContent = 'Robot offline';
    }
}

function agregarPedido(msg) {
    if (pedidos.find(p => p.mesa === msg.mesa)) return;
    pedidos.push({
        mesa: msg.mesa,
        items: msg.items || [],
        hora: msg.hora || new Date().toLocaleTimeString(),
        estado: 'preparando',
        segundos: 0,
        itemsDone: {}
    });
    renderPedidos();
    actualizarStats();

    timers[msg.mesa] = setInterval(() => {
        const p = pedidos.find(p => p.mesa === msg.mesa);
        if (p && p.estado === 'preparando') {
            p.segundos++;
            const el = document.getElementById(`timer-${msg.mesa.replace(' ', '')}`);
            if (el) {
                const m = Math.floor(p.segundos / 60);
                const s = p.segundos % 60;
                el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
                el.className = 'pedido-timer' + (p.segundos > 600 ? ' urgente' : '');
            }
        }
    }, 1000);
}

function marcarListo(mesa) {
    const p = pedidos.find(p => p.mesa === mesa);
    if (!p || p.estado !== 'preparando') return;
    p.estado = 'listo';
    clearInterval(timers[mesa]);
    send({ action: 'pedidoListo', mesa });
    feedback(`✅ Pedido de ${mesa} listo — robot en camino`, 'green');
    renderPedidos();
    actualizarStats();
}

function robotEnCocina(mesa) {
    const p = pedidos.find(p => p.mesa === mesa);
    if (!p) return;
    p.estado = 'robot_aqui';
    renderPedidos();
    actualizarStats();
    feedback(`🤖 Robot en cocina — ¡carga el pedido de ${mesa}!`, 'yellow');
}

function pedidoCargado(mesa) {
    const p = pedidos.find(p => p.mesa === mesa);
    if (!p) return;
    p.estado = 'entregando';
    send({ action: 'pedidoCargado', mesa });
    renderPedidos();
    actualizarStats();
    feedback(`🚀 Robot saliendo hacia ${mesa}`, 'green');
}

function marcarEntregando(mesa) {
    const p = pedidos.find(p => p.mesa === mesa);
    if (p) { p.estado = 'entregando'; renderPedidos(); actualizarStats(); }
}

function eliminarPedido(mesa) {
    pedidos = pedidos.filter(p => p.mesa !== mesa);
    clearInterval(timers[mesa]);
    delete timers[mesa];
    renderPedidos();
    actualizarStats();
}

function toggleItem(mesa, idx) {
    const p = pedidos.find(p => p.mesa === mesa);
    if (!p || p.estado !== 'preparando') return;
    p.itemsDone[idx] = !p.itemsDone[idx];
    renderPedidos();
}

function renderPedidos() {
    const container = document.getElementById('pedidosContainer');
    if (pedidos.length === 0) {
        container.innerHTML = `<div class="empty-state">
            <div class="empty-icon">🍽️</div>
            <div style="font-size:16px">Sin pedidos por ahora</div>
            <div style="font-size:13px">Los pedidos aparecerán aquí cuando los clientes ordenen</div>
        </div>`;
        return;
    }

    container.innerHTML = pedidos.map(p => {
        const mesaId = p.mesa.replace(' ', '');
        const items  = Array.isArray(p.items) ? p.items : [];

        const itemsHtml = items.map((item, idx) => {
            const done = p.itemsDone?.[idx];
            return `<div class="item-row">
                <div class="item-qty">${item.cantidad}x</div>
                <div class="item-name" style="${done ? 'text-decoration:line-through;color:var(--muted)' : ''}">${item.nombre}</div>
                <div class="item-check ${done ? 'done' : ''}" onclick="toggleItem('${p.mesa}', ${idx})">
                    ${done ? '✓' : ''}
                </div>
            </div>`;
        }).join('');

        let cardClass = 'nuevo';
        let timerHtml = '';
        let footerHtml = '';

        if (p.estado === 'preparando') {
            cardClass = 'nuevo';
            timerHtml = `<div class="pedido-timer" id="timer-${mesaId}">0:00</div>`;
            footerHtml = `
                <button class="btn-listo" onclick="marcarListo('${p.mesa}')">✅ Marcar como listo</button>
                <button class="btn-cancelar" onclick="eliminarPedido('${p.mesa}')">✕</button>`;

        } else if (p.estado === 'listo') {
            cardClass = 'listo';
            timerHtml = `<div class="pedido-timer">⏳ Robot en camino</div>`;
            footerHtml = `<button class="btn-listo ya-listo">⏳ Esperando robot...</button>`;

        } else if (p.estado === 'robot_aqui') {
            cardClass = 'robot_aqui';
            timerHtml = `<div class="pedido-timer" style="background:#0a1e0a;color:var(--green)">🤖 Robot aquí</div>`;
            footerHtml = `
                <button class="btn-listo cargado" onclick="pedidoCargado('${p.mesa}')">
                    🤖 ¡Ya cargué el pedido!
                </button>`;

        } else if (p.estado === 'entregando') {
            cardClass = 'entregando';
            timerHtml = `<div class="pedido-timer" style="background:#0a0a1e;color:var(--blue)">🚀 En camino</div>`;
            footerHtml = `<button class="btn-listo ya-listo" style="background:#0a0a1e;color:var(--blue)">🚀 Llevando a mesa...</button>`;
        }

        return `<div class="pedido-card ${cardClass}" id="pedido-${mesaId}">
            <div class="pedido-header">
                <div>
                    <div class="pedido-mesa">${p.mesa.charAt(0).toUpperCase() + p.mesa.slice(1)}</div>
                    <div class="pedido-hora">${p.hora}</div>
                </div>
                ${timerHtml}
            </div>
            <div class="pedido-items">
                ${itemsHtml || '<div style="color:var(--muted);font-size:13px">Pedido recibido</div>'}
            </div>
            <div class="pedido-footer">${footerHtml}</div>
        </div>`;
    }).join('');
}

function actualizarStats() {
    document.getElementById('statPendientes').textContent = pedidos.filter(p => p.estado === 'preparando').length;
    document.getElementById('statListos').textContent     = pedidos.filter(p => p.estado === 'listo' || p.estado === 'robot_aqui').length;
}

function mostrarAlerta() {
    const banner = document.getElementById('alertBanner');
    banner.style.display = 'block';
    setTimeout(() => banner.style.display = 'none', 3000);
    try { new Audio('data:audio/wav;base64,//uQRAAAAWMSLwUIYAAsYkXgoQwAEaYLWfkWgAI0wWs/ItAAAGDgYtAgAyN+QWaAAihwMWm4G8QQRDiMcCBcH3Cc+CDv/7xA4Tvh9Rai1RKmaaFE=').play(); } catch(e) {}
}

function feedback(msg, color = 'green') {
    const el = document.getElementById('feedback');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.color = color === 'red' ? 'var(--red)' : color === 'yellow' ? 'var(--yellow)' : 'var(--green)';
    clearTimeout(el._t);
    el._t = setTimeout(() => el.style.display = 'none', 3000);
}

window.onload = () => {
    const url    = localStorage.getItem('relayUrl');
    const secret = localStorage.getItem('relaySecret');
    if (url)    document.getElementById('relayUrl').value = url;
    if (secret) document.getElementById('relaySecret').value = secret;
};
</script>
</body>
</html>
